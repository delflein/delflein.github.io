<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Busbegleiter">
<meta name="theme-color" content="#0e7c66">
<meta name="description" content="Digitaler Helfer für Feierreisen-Busbegleiter: Teilnehmerliste, Check-in mit Unterschrift, Sitzplätze und Formular-Export – komplett offline auf dem Gerät.">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./assets/icons/icon-192.png">
<link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon.png">
<link rel="stylesheet" href="./styles.css">
<title>Feierreisen Busbegleiter</title>
</head>
<body>
<!-- Kopfleiste: Fahrt-Titel (tippen = zur Fahrtenliste) + Einstellungen -->
<div class="app-bar">
  <button class="tripbtn" id="tripBtn"><span id="hdrTitle">Feierreisen Busbegleiter</span><span class="chev" id="chev">▾</span></button>
  <div class="sub" id="hdrSub">Keine Fahrt ausgewählt</div>
  <button class="gear" id="btnSettings" aria-label="Einstellungen">⚙︎</button>
</div>

<!-- Hier rendert render() die jeweils aktive Ansicht hinein -->
<div class="wrap" id="main"></div>

<!-- Untere Tab-Leiste -->
<nav class="tabbar" id="tabbar">
  <button data-tab="teilnehmer" class="on"><span class="ti">👤</span>Teilnehmer</button>
  <button data-tab="sitz"><span class="ti">💺</span>Sitzplätze</button>
  <button data-tab="formulare"><span class="ti">📋</span>Formulare</button>
  <button data-tab="bericht"><span class="ti">📝</span>Bericht</button>
  <button data-tab="abschluss"><span class="ti">📤</span>Abschluss</button>
</nav>

<div class="toast" id="toast"></div>
<input type="file" id="pdfInput" accept="application/pdf" class="hidden">

<!-- Bibliotheken (lokal gebündelt → offline). Setzen die Globals
     window.pdfjsLib, window.jspdf und window.PDFLib. -->
<script src="./assets/vendor/pdf.min.js"></script>
<script src="./assets/vendor/jspdf.umd.min.js"></script>
<script src="./assets/vendor/jspdf.plugin.autotable.min.js"></script>
<script src="./assets/vendor/pdf-lib.min.js"></script>

<!-- Die App selbst als ES-Modul (lädt alle weiteren Module) -->
<script type="module" src="./js/app.js"></script>
</body>
</html>
