<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Busbegleiter">
<meta name="theme-color" content="#0e7c66">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230e7c66'/%3E%3Ctext x='90' y='122' font-size='96' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'%3EF%3C/text%3E%3C/svg%3E">
<title>Feierreisen Busbegleiter</title>
<style>
:root{
  --accent:#0e7c66; --accent-d:#0a5d4c; --accent-l:#e3f3ef;
  --bg:#f4f5f7; --card:#ffffff; --text:#16191d; --muted:#6b7280; --line:#e4e7ec;
  --danger:#c0392b; --warn:#b7791f; --warn-bg:#fdf3e2; --ok:#0e7c66; --ok-bg:#e3f3ef;
  --chip:#eef1f4; --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --safe-b:env(safe-area-inset-bottom,0px); --safe-t:env(safe-area-inset-top,0px);
}
@media (prefers-color-scheme:dark){
  :root{--bg:#15171b;--card:#1e2126;--text:#e9ecef;--muted:#9aa3ad;--line:#2c3138;
  --accent:#1aa184;--accent-d:#0e7c66;--accent-l:#13322c;--chip:#272c33;--warn-bg:#3a2c14;--warn:#e0b35e;--ok-bg:#13322c;--shadow:0 1px 3px rgba(0,0,0,.4);}
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:16px;line-height:1.45;-webkit-text-size-adjust:100%}
body{padding-bottom:calc(64px + var(--safe-b))}
body.notrip{padding-bottom:var(--safe-b)}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}
input:not([type=checkbox]):not([type=radio]),select,textarea{font:inherit;color:var(--text);background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 11px;outline:none;width:100%}
input::placeholder,textarea::placeholder{color:var(--muted);opacity:1}
input:not([type=checkbox]):not([type=radio]):focus,select:focus,textarea:focus{border-color:var(--accent)}
.hidden{display:none!important}
.app-bar{position:sticky;top:0;z-index:30;background:var(--accent);color:#fff;padding:calc(10px + var(--safe-t)) 14px 10px;box-shadow:var(--shadow)}
.tripbtn{color:#fff;font-size:17px;font-weight:600;display:flex;align-items:center;gap:7px;max-width:80%}
.tripbtn .chev{font-size:13px;opacity:.85}
.app-bar .sub{font-size:12.5px;opacity:.9;margin-top:2px}
.app-bar .gear{position:absolute;right:10px;top:calc(10px + var(--safe-t));color:#fff;font-size:20px;padding:6px 8px}
.wrap{max-width:760px;margin:0 auto;padding:12px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow)}
.row{display:flex;align-items:center;gap:10px}
.muted{color:var(--muted)}.small{font-size:13px}.tiny{font-size:11.5px}.bold{font-weight:600}
.search{position:relative;margin-bottom:10px}
.search input{padding-left:38px;border-radius:12px}
.search .ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted)}
.chips{display:flex;flex-wrap:wrap;gap:7px;padding:2px 0 6px}
.chip{white-space:nowrap;padding:7px 12px;border-radius:999px;background:var(--chip);color:var(--text);font-size:13.5px;border:1px solid transparent}
.chip.on{background:var(--accent);color:#fff}
.chips.orte .chip{background:transparent;border:1px solid var(--line)}
.chips.orte .chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.chipslabel{font-size:11.5px;color:var(--muted);margin:2px 2px 4px}
.counts{font-size:13px;color:var(--muted);margin:2px 2px 10px}
.plist{display:flex;flex-direction:column;gap:8px}
.pcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px 12px;box-shadow:var(--shadow)}
.pcard .top{display:flex;align-items:flex-start;gap:10px}
.nrbadge{flex:0 0 auto;width:34px;height:34px;border-radius:10px;background:var(--accent-l);color:var(--accent-d);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}
.pname{font-weight:600;font-size:15.5px;line-height:1.2}
.ptags{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.tag{font-size:11.5px;padding:2px 7px;border-radius:7px;background:var(--chip);color:var(--muted)}
.tag.cm{background:#eaf3ff;color:#1d4ed8}.tag.gepaeck{background:#f3eafe;color:#7c3aed}
.tag.offen{background:var(--warn-bg);color:var(--warn);font-weight:600}
.tag.bucher{background:#fff4e6;color:#b7791f}
.tag.seat{background:var(--accent-l);color:var(--accent-d)}
@media(prefers-color-scheme:dark){.tag.cm{background:#16273f;color:#7fb0ff}.tag.gepaeck{background:#2a1f3d;color:#c4a3f5}.tag.bucher{background:#3a2c14;color:#e0b35e}}
.pactions{display:flex;gap:7px;margin-top:10px}
.pact{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:9px 4px;border-radius:10px;background:var(--chip);font-size:13px;font-weight:500}
.pact.call{background:#e7f6ee;color:#0e7c66}.pact.wa{background:#e5f7ec;color:#128c4a}.pact.sign{background:var(--accent-l);color:var(--accent-d)}
@media(prefers-color-scheme:dark){.pact.call,.pact.wa{background:#13322c;color:#41c79e}}
.checkbtn{flex:0 0 auto;width:46px;height:46px;border-radius:12px;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:22px;background:var(--card);color:var(--muted)}
.checkbtn.on{background:var(--accent);border-color:var(--accent);color:#fff}
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:40;display:flex;background:var(--card);border-top:1px solid var(--line);padding-bottom:var(--safe-b)}
.tabbar button{flex:1;padding:8px 2px 6px;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--muted);font-size:11px;position:relative}
.tabbar button.on{color:var(--accent)}.tabbar .ti{font-size:21px;line-height:1}
.tabbar .badge{position:absolute;top:4px;left:50%;margin-left:6px;background:var(--danger);color:#fff;font-size:10px;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 16px;border-radius:12px;background:var(--accent);color:#fff;font-weight:600;font-size:15px;width:100%}
.btn.sec{background:var(--chip);color:var(--text)}.btn.out{background:transparent;border:1.5px solid var(--accent);color:var(--accent)}
.btn:disabled{opacity:.45}
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:var(--bg);width:100%;max-width:760px;max-height:92vh;overflow-y:auto;border-radius:18px 18px 0 0;padding:8px 14px calc(20px + var(--safe-b));-webkit-overflow-scrolling:touch}
.sheet .grab{width:40px;height:4px;background:var(--line);border-radius:2px;margin:8px auto 6px}
.sheet h2{font-size:18px;margin:6px 2px 12px}
.page{position:fixed;inset:0;z-index:60;background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch}
.page-bar{position:sticky;top:0;background:var(--accent);color:#fff;display:flex;align-items:center;gap:8px;padding:calc(10px + var(--safe-t)) 12px 10px;box-shadow:var(--shadow);z-index:1}
.page-bar .pback{color:#fff;font-size:16px;font-weight:600;display:flex;align-items:center;gap:3px;padding:4px 4px}
.page-bar .ptitle{font-weight:600;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.page-body{max-width:760px;margin:0 auto;padding:14px}
.field{margin-bottom:12px}
.field label{display:block;font-size:13px;color:var(--muted);margin-bottom:5px}
.field textarea{min-height:64px;resize:vertical}
.kv{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:14.5px}
.kv:last-child{border-bottom:none}.kv .k{color:var(--muted)}
.sigwrap{border:1px solid var(--line);border-radius:12px;background:#fff;position:relative;touch-action:none}
.sigwrap canvas{width:100%;height:200px;display:block;border-radius:12px}
.sigwrap .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#aaa;pointer-events:none}
.sigsaved{border:1px solid var(--accent);border-radius:12px;background:#fff;padding:6px}
.sigsaved img{width:100%;display:block}
.welcome{text-align:center;padding:30px 16px}
.tlogo{width:72px;height:72px;border-radius:20px;background:var(--accent);color:#fff;font-size:38px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.dropzone{border:2px dashed var(--accent);border-radius:16px;padding:26px 16px;background:var(--accent-l);margin:16px 0}
.lrow{display:flex;gap:8px;align-items:flex-start;margin-bottom:6px}
.lrow input{flex:1}
.lrow .att{flex:0 0 auto;width:40px;height:42px;border-radius:10px;background:var(--chip);color:var(--accent);font-size:16px}
.lrow .att.has{background:var(--accent-l);color:var(--accent-d)}
.lrow .x{flex:0 0 auto;width:38px;height:42px;border-radius:10px;background:var(--chip);color:var(--danger);font-size:18px}
.belegline{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted);margin:-2px 2px 10px 2px}
.belegline .rm{color:var(--danger)}
.sumbar{display:flex;justify-content:space-between;font-weight:700;font-size:16px;padding:10px 2px;border-top:2px solid var(--line);margin-top:6px}
.sectitle{font-size:15px;font-weight:700;margin:18px 2px 8px;display:flex;align-items:center;gap:8px}
.seg{display:flex;background:var(--chip);border-radius:11px;padding:3px;gap:3px}
.seg button{flex:1;padding:9px;border-radius:9px;font-size:14px;color:var(--muted)}
.seg button.on{background:var(--card);color:var(--text);font-weight:600;box-shadow:var(--shadow)}
.toast{position:fixed;bottom:calc(74px + var(--safe-b));left:50%;transform:translateX(-50%);z-index:80;background:#16191d;color:#fff;padding:10px 16px;border-radius:10px;font-size:14px;box-shadow:var(--shadow);opacity:0;transition:opacity .2s;max-width:90%;text-align:center}
.toast.show{opacity:.96}
.note{background:var(--warn-bg);color:var(--warn);border-radius:10px;padding:10px 12px;font-size:13px;margin:8px 0}
.note.ok{background:var(--ok-bg);color:var(--ok)}
hr.sep{border:none;border-top:1px solid var(--line);margin:14px 0}
.progress{height:8px;background:var(--chip);border-radius:5px;overflow:hidden;margin:6px 0 12px}
.progress > div{height:100%;background:var(--accent);width:0}
.linkbtn{color:var(--accent);font-weight:600;font-size:14px;padding:4px 2px;background:none;width:auto}
.tripitem{display:flex;align-items:center;gap:10px;padding:13px;border:1px solid var(--line);border-radius:14px;background:var(--card);margin-bottom:9px}
.tripitem.active{border-color:var(--accent);background:var(--accent-l)}
.tripitem .meta{flex:1;min-width:0}.tripitem .nm{font-weight:600}
.tripitem .tdel{color:var(--danger);font-size:18px;padding:6px 8px;width:auto;flex:0 0 auto}
</style>
</head>
<body>
<div class="app-bar">
  <button class="tripbtn" id="tripBtn"><span id="hdrTitle">Feierreisen Busbegleiter</span><span class="chev" id="chev">▾</span></button>
  <div class="sub" id="hdrSub">Keine Fahrt ausgewählt</div>
  <button class="gear" id="btnSettings" aria-label="Einstellungen">⚙︎</button>
</div>
<div class="wrap" id="main"></div>
<nav class="tabbar" id="tabbar">
  <button data-tab="teilnehmer" class="on"><span class="ti">👤</span>Teilnehmer</button>
  <button data-tab="sitz"><span class="ti">💺</span>Sitzplätze</button>
  <button data-tab="formulare"><span class="ti">📋</span>Formulare</button>
  <button data-tab="abschluss"><span class="ti">📤</span>Abschluss</button>
</nav>
<div class="toast" id="toast"></div>

  for(const r of rows){const joined=r.map(i=>i.s).join(' ');
    if(joined.includes('Handy')&&joined.includes('Abfahrtsort')){
      const b={nr:14};for(const key in HEADER_LABELS){const it=r.find(i=>i.s.includes(HEADER_LABELS[key]));if(it)b[key]=Math.round(it.x)-3;}
      b.end=(r[r.length-1].x)+80;if(b.name&&b.handy&&b.offen)return b;}}
  return null;
}
function groupRows(items,tol){tol=tol||8;
  const sorted=items.filter(i=>i.s.trim()!=='').slice().sort((a,b)=>b.y-a.y);
  const rows=[];let cur=[],curY=null;
  for(const it of sorted){if(curY===null||Math.abs(it.y-curY)<=tol){cur.push(it);curY=curY===null?it.y:(curY+it.y)/2;}else{rows.push(cur);cur=[it];curY=it.y;}}
  if(cur.length)rows.push(cur);return rows.map(r=>r.sort((a,b)=>a.x-b.x));
}
function rowToCells(row,bounds){const cells={};COLS.forEach(c=>cells[c]='');
  const edges=COLS.map(c=>bounds[c]);edges.push(bounds.end);
  for(const it of row){let ci=0;for(let k=0;k<COLS.length;k++){if(it.x>=edges[k]-2)ci=k;}cells[COLS[ci]]=(cells[COLS[ci]]?cells[COLS[ci]]+' ':'')+it.s.trim();}
  COLS.forEach(c=>cells[c]=cells[c].replace(/\s+/g,' ').trim());return cells;
}
function parseTeilnehmer(pages){
  let bounds=null;const participants=[];const bookings=[];const warnings=[];let pending='';let cur=null;let bid=0;
  for(let pageIndex=0;pageIndex<pages.length;pageIndex++){
    const page=pages[pageIndex];const rows=groupRows(page.items);const hb=detectHeaderBounds(rows);if(hb)bounds=hb;const B=bounds||DEFAULT_BOUNDS;
    for(const row of rows){
      const c=rowToCells(row,B);const joined=row.map(i=>i.s).join(' ');
      if(joined.includes('Handy')&&joined.includes('Abfahrtsort'))continue;
      if(joined.includes('Skat')&&c.name==='')continue;
      const isNum=/^\d{1,3}$/.test(c.nr);const isPaid=/bezahlt/i.test(c.offen)||/bezahlt/i.test(c.kommentar);const handy=c.handy.replace(/\s+/g,'');
      if(isNum){const name=cleanName((pending?pending+' ':'')+c.name);pending='';
        if(!cur){cur={id:++bid,bucher:'',handy:'',paid:false};bookings.push(cur);}
        participants.push({nr:parseInt(c.nr,10),name,handy,abfahrtsort:c.abfahrtsort,ticket:c.ticket,skat:c.skat,sondergepaeck:c.sondergepaeck,camp:/ja/i.test(c.camp),kommentar:c.kommentar,buchungId:cur.id,bucher:cur.bucher,istBucher:false,bezahlt:cur.paid,anwesend:false,sitzplatz:'',signature:null,status:'',manuell:false,page:pageIndex,y:Math.round(row[0].y),sx0:Math.round(B.sitzplatz),sx1:Math.round(B.handy)});
      }else{const signal=!!handy||isPaid;
        if(signal){const name=cleanName((pending?pending+' ':'')+c.name);pending='';cur={id:++bid,bucher:name,handy:handy,paid:isPaid};bookings.push(cur);}
        else if(c.name){pending=cleanName((pending?pending+' ':'')+c.name);}}
    }
  }
  const bmap={};bookings.forEach(b=>bmap[b.id]=b);
  for(const p of participants){const b=bmap[p.buchungId];if(b){p.bucher=b.bucher;p.bezahlt=b.paid;p.istBucher=!!(b.bucher&&p.name===b.bucher);}}
  const used={};participants.forEach(p=>used[p.buchungId]=1);const realB=bookings.filter(b=>used[b.id]);
  const nums=participants.map(p=>p.nr);const min=nums.length?Math.min.apply(null,nums):0,max=nums.length?Math.max.apply(null,nums):0;
  const missing=[];const seen={};for(let n=min;n<=max;n++)if(nums.indexOf(n)<0)missing.push(n);
  const dups=nums.filter(n=>{seen[n]=(seen[n]||0)+1;return seen[n]===2;});
  if(missing.length)warnings.push('Fehlende Nummern: '+missing.join(', '));
  if(dups.length)warnings.push('Doppelte Nummern: '+dups.join(', '));
  return {participants,bookings:realB,meta:{count:participants.length,min,max,missing,dups,bookingCount:realB.length,offen:realB.filter(b=>!b.paid).length,warnings,bounds:(bounds||DEFAULT_BOUNDS)}};
}

async function doImport(file){

  toast('Lese PDF …');
  try{
    const buf=await file.arrayBuffer();const u8=new Uint8Array(buf);const b64=abToB64(u8);
    const doc=await pdfjsLib.getDocument({data:u8.slice()}).promise;const pages=[];
    for(let i=1;i<=doc.numPages;i++){const page=await doc.getPage(i);const tc=await page.getTextContent();pages.push({items:tc.items.filter(t=>t.str.trim()!=='').map(t=>({s:t.str,x:t.transform[4],y:t.transform[5]}))});}
    const {participants,bookings,meta}=parseTeilnehmer(pages);
    if(!participants.length){toast('Keine Teilnehmer erkannt – ist es die richtige Liste?');return;}
    const t=T();const prev={};t.participants.forEach(p=>prev[p.nr]=p);
    participants.forEach(p=>{const o=prev[p.nr];if(o){p.anwesend=o.anwesend;p.sitzplatz=o.sitzplatz;p.signature=o.signature;}});
    t.participants=participants;t.bookings=bookings;t.pdfData=b64;t.pdfName=file.name;t.bounds=meta.bounds;
    const fn=file.name.replace(/\.pdf$/i,'');const bus=(fn.match(/Bus\s*0?(\d+)/i)||[])[1];if(bus&&!t.busNr)t.busNr=bus;
    t.importedAt=new Date().toISOString();save();
    let msg=participants.length+' Teilnehmer · '+meta.bookingCount+' Buchungen'+(meta.offen?(' · '+meta.offen+' offen'):' · alle bezahlt');if(meta.warnings.length)msg+=' ⚠';
    ui().tab='teilnehmer';render();setTimeout(()=>toast(msg),300);
    if(meta.warnings.length)setTimeout(()=>alert('Hinweis beim Import:\n'+meta.warnings.join('\n')+'\n\nBitte diese Nummern manuell prüfen.'),600);
  }catch(err){console.error(err);toast('Fehler beim Lesen der PDF');}
}

function renderSig(area,p,opts){

    sv.innerHTML='<div class="sigsaved"><img src="'+p.signature+'" alt="Unterschrift"></div><button class="btn sec" id="reSig" style="margin-top:8px">Neu unterschreiben</button>'+(opts.checkin?'<button class="btn" id="ciDone" style="margin-top:8px">Einchecken</button>':'');

    if(opts.checkin)sv.querySelector('#ciDone').onclick=()=>{p.anwesend=true;save();opts.onSaved&&opts.onSaved();};
    area.appendChild(sv);return;}
  const w=elFromHTML('<div></div>');
  w.innerHTML='<div class="sigwrap"><canvas></canvas><div class="ph">Hier mit dem Finger unterschreiben</div></div><div class="row" style="gap:8px;margin-top:8px"><button class="btn sec" id="sigClear" style="flex:1">Löschen</button><button class="btn" id="sigSave" style="flex:2">'+(opts.checkin?'Unterschreiben & einchecken':'Unterschrift speichern')+'</button></div>';
  area.appendChild(w);
  const canvas=w.querySelector('canvas');const ph=w.querySelector('.ph');const ctx=canvas.getContext('2d');let drawing=false,dirty=false,last=null;
  function resize(){const r=canvas.getBoundingClientRect();const dpr=window.devicePixelRatio||1;canvas.width=Math.max(1,r.width*dpr);canvas.height=Math.max(1,r.height*dpr);ctx.scale(dpr,dpr);ctx.lineWidth=2.4;ctx.lineCap='round';ctx.lineJoin='round';ctx.strokeStyle='#10243b';}
  setTimeout(resize,30);
  const pos=e=>{const r=canvas.getBoundingClientRect();const tp=e.touches?e.touches[0]:e;return {x:tp.clientX-r.left,y:tp.clientY-r.top};};
  const start=e=>{e.preventDefault();drawing=true;dirty=true;ph.style.display='none';last=pos(e);};
  const move=e=>{if(!drawing)return;e.preventDefault();const p2=pos(e);ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();last=p2;};
  const end=()=>{drawing=false;};
  canvas.addEventListener('mousedown',start);canvas.addEventListener('mousemove',move);window.addEventListener('mouseup',end);
  canvas.addEventListener('touchstart',start,{passive:false});canvas.addEventListener('touchmove',move,{passive:false});canvas.addEventListener('touchend',end);
  w.querySelector('#sigClear').onclick=()=>{ctx.clearRect(0,0,canvas.width,canvas.height);dirty=false;ph.style.display='';};

    const out=document.createElement('canvas');out.width=600;out.height=200;const octx=out.getContext('2d');octx.drawImage(canvas,0,0,out.width,out.height);
    p.signature=out.toDataURL('image/png');p.anwesend=true;save();renderSig(area,p,opts);
    if(!opts.checkin)toast('Unterschrift gespeichert ✓');opts.onSaved&&opts.onSaved();};

    const pr=d.querySelector('.progress > div');if(pr)pr.style.width=(ps.length?Math.round(ps.filter(p=>p.sitzplatz).length/ps.length*100):0)+'%';

  return d;

  async function stampList(doc){const font=await doc.embedFont(StandardFonts.Helvetica);const pgs=doc.getPages();

  function tableDoc(){const doc=new jsPDF({unit:'pt',format:'a4'});const W=doc.internal.pageSize.getWidth();
    doc.setFont('helvetica','bold');doc.setFontSize(16);doc.text(t.name||'Feierreisen Fahrt',40,44);doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(90);doc.text('Bus '+(t.busNr||'—')+'   ·   '+(fmtDate(t.datum)||'')+'   ·   Begleiter: '+(state.settings.betreuer||'—'),40,62);doc.setTextColor(20);

    return doc.output('arraybuffer');
  }
  async function withReceipts(doc,items,prefix){let font=null;for(let i=0;i<items.length;i++){const it=items[i];if(!it.beleg)continue;const bl=it.beleg;try{if(bl.type==='pdf'){const rd=await PDFDocument.load(dataURLToBytes(bl.data));const cp=await doc.copyPages(rd,rd.getPageIndices());cp.forEach(pg=>doc.addPage(pg));}else{if(!font)font=await doc.embedFont(StandardFonts.Helvetica);const bytes=dataURLToBytes(bl.data);let img;try{img=await doc.embedJpg(bytes);}catch(e){img=await doc.embedPng(bytes);}const page=doc.addPage([595,842]);const r=Math.min(515/img.width,690/img.height,1);const w=img.width*r,h=img.height*r;page.drawText('Beleg '+prefix+': '+(it.firma||it.text||('#'+(i+1))),{x:40,y:800,size:11,font});page.drawImage(img,{x:40,y:780-h,width:w,height:h});}}catch(e){}}return doc;}
  try{
    const nameCL=busTagOf(t)+'_'+evTagOf(t)+'_Checkliste_Teilnehmer.pdf';
    const nameAus=busTagOf(t)+'_'+evTagOf(t)+'_Auslagen_'+eurTag(sumItems(f.auslagen.items))+'.pdf';
    const nameEin=busTagOf(t)+'_'+evTagOf(t)+'_'+(safeTag(state.settings.betreuer)||'Begleiter')+'_Einnahmen_'+eurTag(sumItems(f.einnahmen.items))+'.pdf';

/* =================== SETTINGS =================== */
function openSettings(){
  const k=state.settings.konto;const n=elFromHTML('<div></div>');
  n.innerHTML='<h2>Einstellungen</h2><div class="field"><label>Dein Name (Busbegleiter)</label><input id="sBetreuer" value="'+esc(state.settings.betreuer)+'"></div>'+
    '<div class="sectitle">Kontodaten für Auslagenerstattung</div><p class="tiny muted" style="margin:-4px 0 8px">Einmal hinterlegen – gilt für alle Fahrten.</p>'+
    '<div class="field"><label>Kontoinhaber</label><input id="kInh" value="'+esc(k.inhaber)+'"></div><div class="field"><label>IBAN</label><input id="kIban" value="'+esc(k.iban)+'"></div><div class="field"><label>Bank</label><input id="kBank" value="'+esc(k.bank)+'"></div>'+
    '<div class="sectitle">WhatsApp-Nachricht</div><div class="field"><label>Vorlage „an alle" ({invite} = Gruppenlink der Fahrt)</label><textarea id="sTpl">'+esc(state.settings.waTemplate)+'</textarea></div>'+
    '<hr class="sep">'+(T()?'<button class="btn sec" id="reimport">📄 Liste in „'+esc(T().name)+'" importieren</button>':'')+'<p class="tiny muted" style="text-align:center;margin-top:14px">Alle Daten liegen nur lokal auf diesem Gerät (IndexedDB).</p><button class="btn" id="sClose" style="margin-top:6px">Fertig</button>';
  const bg=openSheet(n);
  n.querySelector('#sBetreuer').oninput=e=>{state.settings.betreuer=e.target.value;save();};
  n.querySelector('#kInh').oninput=e=>{k.inhaber=e.target.value;save();};
  n.querySelector('#kIban').oninput=e=>{k.iban=e.target.value;save();};
  n.querySelector('#kBank').oninput=e=>{k.bank=e.target.value;save();};
  n.querySelector('#sTpl').oninput=e=>{state.settings.waTemplate=e.target.value;save();};
  const ri=n.querySelector('#reimport');if(ri)ri.onclick=()=>{bg._close();$('#pdfInput').click();};
  n.querySelector('#sClose').onclick=()=>{bg._close();render();};
}

/* =================== INIT =================== */
function bindUI(){
  $('#tripBtn').onclick=()=>{state.activeId=null;save();render();};
  $('#btnSettings').onclick=openSettings;
  document.querySelectorAll('.tabbar button').forEach(b=>b.onclick=()=>setTab(b.dataset.tab));
  $('#pdfInput').addEventListener('change',async e=>{const f=e.target.files[0];if(!f)return;await doImport(f);e.target.value='';});
  window.addEventListener('dragover',e=>e.preventDefault());
  window.addEventListener('drop',e=>{e.preventDefault();const f=[...e.dataTransfer.files].find(x=>x.type==='application/pdf');if(f)doImport(f);});
  window.addEventListener('pagehide',doSave);
  document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden')doSave();});
}
(async function init(){const loaded=await persistLoad();state=migrate(loaded);bindUI();render();})();
</script>
